<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luminescence | Diagnostics</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .status-card {
            border: 1px solid #1e293b;
            padding: 2rem;
            border-radius: 12px;
            background: #1e293b66;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .pulse {
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            margin: 1rem auto;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
    </style>
</head>
<body>
<div class="status-card">
    <div class="pulse"></div>
    <h1 id="main-title">Initializing Engine...</h1>
    <p>Testing JNI Callbacks & Rendering</p>
</div>

<script>
    // Trigger onConsoleMessageAdded
    console.log("Luminescence: Native view initialized successfully.");

    // Cycle title to test onTitleChange callback
    const statuses = ["System Ready", "Rendering Active", "Luminescence Core"];
    let i = 0;
    setInterval(() => {
        const newTitle = "Luminescence | " + statuses[i % statuses.length];
        document.title = newTitle;
        document.getElementById('main-title').innerText = statuses[i % statuses.length];
        console.log("Internal State Change: " + newTitle);
        i++;
    }, 5000);
</script>
</body>
</html>
