name: 🪟 Windows Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1: COMPILE NATIVE BINARIES ───────────────────────────────────────
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-2025-vs2026
    outputs:
      sdk-path: ${{ steps.expose-sdk.outputs.path }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Cache Ultralight SDK
        id: cache-sdk
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ultralight-sdk
          key: ultralight-sdk-windows-x64-1.4.0

      - name: Download Ultralight SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $sdkArchive = "$env:RUNNER_TEMP\ultralight-sdk.7z"
          gh release download 1.4.0 --repo Ayydxn/Voxellight-Ultralight-SDKs --pattern "ultralight-free-sdk-1.4.0-win-x64.7z" --output $sdkArchive
          & "C:\Program Files\7-Zip\7z.exe" x $sdkArchive -o"$env:RUNNER_TEMP\ultralight-sdk" -y
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build Native JNI
        shell: pwsh
        run: |
          ./gradlew generateJniHeaders --no-daemon
          cmake -S src/main/native -B build/cmake-build -G "Visual Studio 18 2026" -A x64 -DJNI_HEADER_DIR="$(Resolve-Path build/jni-headers)" -DULTRALIGHT_SDK="$env:RUNNER_TEMP\ultralight-sdk" -DPLATFORM="windows-x64" -DCMAKE_BUILD_TYPE=Release
          cmake --build build/cmake-build --config Release --parallel

      - name: Upload Binary for Testing
        uses: actions/upload-artifact@v4
        with:
          name: LuminescenceJNI-windows-x64
          path: build/cmake-build/Release/LuminescenceJNI.dll
          retention-days: 1

  # ── JOB 2: RUN UNIT TESTS ────────────────────────────────────────────────
  test-windows:
    name: Unit Tests (Windows x64)
    needs: build-windows # This creates the visual separation and dependency
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      # We need the SDK again for the DLLs (Ultralight.dll, AppCore.dll, etc.)
      - name: Restore Ultralight SDK
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ultralight-sdk
          key: ultralight-sdk-windows-x64-1.4.0

      - name: Download Built JNI DLL
        uses: actions/download-artifact@v8
        with:
          name: LuminescenceJNI-windows-x64
          path: build/resources/main/natives/windows-x64

      - name: Run Gradle Tests
        shell: pwsh
        run: |
          ./gradlew test `
            -Pultralight_sdk_location="$env:RUNNER_TEMP\ultralight-sdk" `
            --no-daemon `
            --continue

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: build/test-results/test/TEST-*.xml