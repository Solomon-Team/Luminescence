name: Build and Test Luminescence (Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-flight runs for the same branch so a force-push doesn't queue up multiple redundant builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-windows:
    name: Build & Test (Windows x64)
    runs-on: windows-2025-vs2026

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ─────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      # actions/setup-java caches the Gradle wrapper too, but we add an explicit
      # Gradle cache key so the dependency resolution cache also survives.
      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 3. Ultralight SDK ────────────────────────────────────────────────────
      # Users must supply the SDK as a repository secret.
      # Add it via: Settings → Secrets → Actions → New repository secret
      #   Name:  ULTRALIGHT_SDK_WINDOWS_X64
      #   Value: base64-encoded zip of the SDK root
      #          PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("sdk.zip"))
      - name: Restore Ultralight SDK
        shell: pwsh
        env:
          ULTRALIGHT_SDK_B64: ${{ secrets.ULTRALIGHT_SDK_WINDOWS_X64 }}
        run: |
          $sdkZip = "$env:RUNNER_TEMP\ultralight-sdk.zip"
          $sdkDir = "$env:RUNNER_TEMP\ultralight-sdk"

          [IO.File]::WriteAllBytes($sdkZip, [Convert]::FromBase64String($env:ULTRALIGHT_SDK_B64))
          Expand-Archive -Path $sdkZip -DestinationPath $sdkDir -Force

          # Expose the path to subsequent steps
          "ULTRALIGHT_SDK_DIR=$sdkDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 4. JNI headers ───────────────────────────────────────────────────────
      - name: Generate JNI Headers
        shell: pwsh
        run: ./gradlew generateJniHeaders --no-daemon

      # ── 5. CMake configure ───────────────────────────────────────────────────
      # windows-2025-vs2026 ships Visual Studio 2026, so "Visual Studio 18 2026" matches the generator string already in build.gradle.kts exactly.
      - name: Configure CMake
        shell: pwsh
        run: |
          $buildDir   = "build/cmake-build"
          $headerDir  = "build/jni-headers"

          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null

          cmake `
            -S src/main/native `
            -B $buildDir `
            -G "Visual Studio 18 2026" `
            -A x64 `
            -DJNI_HEADER_DIR="$(Resolve-Path $headerDir)" `
            -DULTRALIGHT_SDK="$env:ULTRALIGHT_SDK_DIR" `
            -DPLATFORM="windows-x64" `
            -DCMAKE_BUILD_TYPE=Release

      # ── 6. CMake build ───────────────────────────────────────────────────────
      - name: Build
        shell: pwsh
        run: |
          cmake --build build/cmake-build --config Release --parallel

          # Copy the DLL into the resources tree so the classpath loader can
          # find it, mirroring what the Gradle compileNative doLast block does.
          $dest = "build/resources/main/natives/windows-x64"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "build/cmake-build/Release/LuminescenceJNI.dll" -Destination $dest

      # ── 7. Unit tests ────────────────────────────────────────────────────────
      # The Gradle test task already sets java.library.path and PATH using the
      # ultralight_sdk_location property. We pass it here so it resolves to the
      # extracted SDK rather than the local.properties value.
      - name: Run Tests
        shell: pwsh
        run: |
          ./gradlew test `
            -Pultralight_sdk_location="$env:ULTRALIGHT_SDK_DIR" `
            --no-daemon `
            --continue
        env:
          # Make the Ultralight DLLs visible to the Windows loader.
          # The Gradle test task adds them to PATH, but setting it here too
          # covers any edge cases where DLL resolution happens before the JVM
          # reads java.library.path.
          PATH: "${{ env.ULTRALIGHT_SDK_DIR }}\\bin;${{ env.PATH }}"

      # ── 8. Test report ───────────────────────────────────────────────────────
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()    # run even when tests fail so the report is always visible
        with:
          report_paths: build/test-results/test/TEST-*.xml
          detailed_summary: true
          include_passed: true

      # ── 9. Artifacts ─────────────────────────────────────────────────────────
      - name: Upload LuminescenceJNI.dll
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LuminescenceJNI-windows-x64
          path: build/cmake-build/Release/LuminescenceJNI.dll
          retention-days: 30

      - name: Upload Test Reports On Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports-windows
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7